services:
  lms-discovery-service:
    image: lms-discovery-service
    container_name: lms-discovery-service
    build: ./server
    environment:
      - EUREKA_HOST=lms-discovery-service
    ports:
      - "8761:8761"
    restart: on-failure
    networks:
      - lms-backend-n

  lms-auth-service:
    image: lms-auth-service
    container_name: lms-auth-service
    build: ./auth
    environment:
      - EUREKA_HOST=lms-discovery-service
      - WAIT_HOSTS=lms-discovery-service:8761
    ports:
      - "8081"
    depends_on:
      - lms-discovery-service
    restart: on-failure
    networks:
      - lms-backend-n

  lms-book-service:
    image: lms-book-service
    container_name: lms-book-service
    build: ./book
    environment:
      - EUREKA_HOST=lms-discovery-service
      - WAIT_HOSTS=lms-discovery-service:8761
    ports:
      - "8082"
    depends_on:
      - lms-discovery-service
    restart: on-failure
    networks:
      - lms-backend-n

  lms-inventory-service:
    image: lms-inventory-service
    container_name: lms-inventory-service
    build: ./inventory
    environment:
      - EUREKA_HOST=lms-discovery-service
      - WAIT_HOSTS=lms-discovery-service:8761
    ports:
      - "8083"
    depends_on:
      - lms-discovery-service
    restart: on-failure
    networks:
      - lms-backend-n

  lms-order-service:
    image: lms-order-service
    container_name: lms-order-service
    build: ./order
    environment:
      - EUREKA_HOST=lms-discovery-service
      - WAIT_HOSTS=lms-discovery-service:8761
    ports:
      - "8084"
    depends_on:
      - lms-discovery-service
    restart: on-failure
    networks:
      - lms-backend-n

  lms-user-service:
    image: lms-user-service
    container_name: lms-user-service
    build: ./user
    environment:
      - EUREKA_HOST=lms-discovery-service
      - WAIT_HOSTS=lms-discovery-service:8761
    ports:
      - "8085"
    depends_on:
      - lms-discovery-service
    restart: on-failure
    networks:
      - lms-backend-n

  lms-client-service:
    image: lms-client-service
    container_name: lms-client-service
    build: ./client-backend
    environment:
      - EUREKA_HOST=lms-discovery-service
      - WAIT_HOSTS=lms-discovery-service:8761
      - MIMO_API_KEY=${MIMO_API_KEY:-}
      - MIMO_BASE_URL=${MIMO_BASE_URL:-https://api.xiaomimimo.com/v1}
      - MIMO_MODEL=${MIMO_MODEL:-mimo-v2.5-pro}
      - LMSTUDIO_BASE_URL=${LMSTUDIO_BASE_URL:-http://host.docker.internal:1234/v1}
      - LMSTUDIO_MODEL=${LMSTUDIO_MODEL:-qwen3.5-27b}
      - LMSTUDIO_ENABLED=${LMSTUDIO_ENABLED:-true}
    ports:
      - "8086:8086"
    depends_on:
      - lms-discovery-service
    restart: on-failure
    networks:
      - lms-backend-n

  lms-frontend-service:
    image: lms-frontend-service
    container_name: lms-frontend-service
    build: ./client-frontend
    ports:
      - "8090:8080"
    restart: on-failure
    networks:
      - lms-frontend-n


networks:
  lms-backend-n: {}
  lms-frontend-n: {}
