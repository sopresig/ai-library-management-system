server:
  port: 8085
  servlet:
    context-path: /api/users
lms:
  client:
    key: ${LMS_CLIENT_KEY:dev-lms-client-key}
spring:
  application:
    name: lms-user-service
  datasource:
    url: jdbc:h2:mem:lms_users;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-users
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: create
eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:${EUREKA_PORT:8761}/eureka/