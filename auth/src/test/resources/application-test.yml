server:
  port: 8081
  servlet:
    context-path: /api/auth
lms:
  client:
    key: ${LMS_CLIENT_KEY:dev-lms-client-key}
spring:
  application:
    name: lms-auth-service
eureka:
  instance:
    hostname: localhost
  client:
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://localhost:8761/eureka/
