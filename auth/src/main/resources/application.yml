server:
  port: 8081
  servlet:
    context-path: /api/auth
lms:
  client:
    key: ${LMS_CLIENT_KEY:dev-lms-client-key}
spring:
  application:
    name: lms-auth-service
eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:${EUREKA_PORT:8761}/eureka/
